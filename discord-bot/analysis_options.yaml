include: package:lints/recommended.yaml

linter:
  # For all rules see: https://dart.dev/tools/linter-rules
  rules:
    always_use_package_imports: true
    cancel_subscriptions: true
    close_sinks: true
    deprecated_member_use_from_same_package: true
    prefer_void_to_null: true
    throw_in_finally: true
    unnecessary_statements: true
    always_put_required_named_parameters_first: true
    prefer_double_quotes: true
    slash_for_doc_comments: false
    require_trailing_commas: true

analyzer:
  exclude: [build/**, lib/**.freezed.dart, lib/**.g.dart]

# Additional information about this file can be found at https://dart.dev/guides/language/analysis-options
