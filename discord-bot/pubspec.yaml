name: discord_bot
description: Discord bot with quality of life features for server stuff.
version: 1.0.0

environment:
  sdk: ^3.11.1

dependencies:
  dotenv: ^4.2.0
  drift: ^2.32.0
  logging: ^1.3.0
  nyxx: ^6.8.1
  nyxx_commands: ^6.1.0
  path: ^1.9.1
  shelf_web_socket: ^3.0.0
  sqlite3: ^3.2.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.13

dependency_overrides:
  analyzer: ^10.0.0
  dart_style: ^3.0.0
